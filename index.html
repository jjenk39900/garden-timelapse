<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BEAN CAM</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin-top: 20px;
            font-size: 3rem;
            letter-spacing: 3px;
        }
        img {
            max-width: 95%;
            height: auto;
            margin-top: 20px;
            border: 4px solid #444;
            border-radius: 8px;
        }
        .timestamp {
            margin-top: 15px;
            font-size: 1rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>THE BEAN CAM</h1>

    <img id="beanImage" src="latest.jpg" alt="Garden Cam">

    <div class="timestamp" id="tsText"></div>

    <script>
        function refreshImage() {
            const img = document.getElementById("beanImage");
            const ts = Date.now();
            img.src = "latest.jpg?ts=" + ts;
            document.getElementById("tsText").textContent =
                "Last refreshed: " + new Date(ts).toLocaleString();
        }

        // Initial load
        refreshImage();

        // Refresh every 60 seconds
        setInterval(refreshImage, 60000);
    </script>

</body>
</html>
